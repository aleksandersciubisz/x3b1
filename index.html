	<body>
		<div id="timer-message">
			<p>
				<span style="font-style: italic"
					>This website is a placeholder used for testing.
				</span>

				<br />
				<br />

				algorithm developement: 70% <br />
				algorithm effectivenes: &lt;50% <br />
				design language: 100% <br />
				UX/UI testing: 90% <br />
				<span style="font-weight: 900">
					launch:&nbsp;<span id="timer"></span>
				</span>
			</p>
		</div>
		<a
			id="logo"
			href="">
			<img
				src="x/x3b1.svg"
				alt="" />
		</a>
		<nav>
			<p>Try</p>

				data-text="x3b1::predictor"

			>

				>more</a

			<p>;</p>
		</nav>
		<section id="future">
			<h2>
				Do you want to&nbsp;know&nbsp;the&nbsp;<span class="cc1">future</span>?
			</h2>
		</section>
		<section id="past">
			<p>
				or read <span class="cc1">past</span
				><a
					id="past-predictions"
					data-text="predictions"
					href=""
					>predictions</a
				>
			</p>
		</section>
		<script>
			// timer
			document.addEventListener('DOMContentLoaded', function () {
				const targetDate = new Date(new Date().getFullYear(), 4, 1)
				const timerElement = document.getElementById('timer')

				function updateTimer() {
					const now = new Date()
					const timeDifference = targetDate - now

					if (timeDifference <= 0) {
						timerElement.textContent = 'Czas minął!'
						clearInterval(timerInterval)
						return
					}

					const days = Math.floor(timeDifference / (1000 * 60 * 60 * 24))
					const hours = Math.floor(
						(timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)
					)
					const minutes = Math.floor(
						(timeDifference % (1000 * 60 * 60)) / (1000 * 60)
					)

					timerElement.textContent = `${days}d ${hours}h ${minutes}m`
				}

				updateTimer()
				const timerInterval = setInterval(updateTimer, 60000)
			})
		</script>
	</body>
</html>
